      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--color-text);
    }
    .quiz-option-row {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
    }
    .qo-btn {
      padding: var(--space-2) var(--space-4);
      font-size: var(--text-sm);
      font-weight: 500;
      border-radius: var(--radius-full);
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      color: var(--color-text-muted);
      transition: all var(--transition-interactive);
    }
    .qo-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .qo-btn.selected {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: var(--color-primary-text);
    }
    .start-quiz-btn {
      width: 100%;
      padding: var(--space-4);
      font-size: var(--text-base);
      font-weight: 700;
      border-radius: var(--radius-lg);
      background: var(--color-primary);
      color: var(--color-primary-text);
      border: none;
      transition: background var(--transition-interactive);
    }
    .start-quiz-btn:hover { background: var(--color-primary-hover); }

    .quiz-active { display: flex; flex-direction: column; gap: var(--space-5); }
    .quiz-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) var(--space-5);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      gap: var(--space-3);
      flex-wrap: wrap;
    }
    .quiz-progress-text {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--color-text);
    }
    .quiz-score {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
    }
    .quiz-timer {
      font-size: var(--text-sm);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--color-primary);
      background: var(--color-primary-highlight);
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
    }
    .quiz-timer.warning { color: var(--color-gold); background: var(--color-gold-highlight); }
    .quiz-timer.danger { color: var(--color-error); background: var(--color-error-highlight); }

    .quiz-q-bar {
      height: 4px;
      background: var(--color-border);
      border-radius: var(--radius-full);
      overflow: hidden;
    }
    .quiz-q-fill {
      height: 100%;
      background: var(--color-primary);
      border-radius: var(--radius-full);
      transition: width 300ms ease;
    }

    .question-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-6);
    }
    .question-meta {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
    }
    .q-topic-tag {
      font-size: var(--text-xs);
      font-weight: 600;
      padding: 3px 10px;
      border-radius: var(--radius-full);
      background: var(--color-primary-highlight);
      color: var(--color-primary);
    }
    .q-trick-tag {
      font-size: var(--text-xs);
      font-weight: 700;
      padding: 3px 10px;
      border-radius: var(--radius-full);
      background: var(--color-gold-highlight);
      color: var(--color-gold);
    }
    .question-num {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-left: auto;
    }
    .question-text {
      font-size: var(--text-base);
      color: var(--color-text);
      line-height: 1.65;
      margin-bottom: var(--space-5);
      font-weight: 500;
    }
    .options-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }
    .option-btn {
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-lg);
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      text-align: left;
      font-size: var(--text-sm);
      color: var(--color-text);
      transition: all var(--transition-interactive);
      cursor: pointer;
    }
    .option-btn:hover:not(:disabled) { border-color: var(--color-primary); background: var(--color-primary-highlight); }
    .option-btn.selected { border-color: var(--color-primary); background: var(--color-primary-highlight); }
    .option-btn.correct { border-color: var(--color-success); background: var(--color-success-highlight); color: var(--color-success); }
    .option-btn.incorrect { border-color: var(--color-error); background: var(--color-error-highlight); color: var(--color-error); }
    .option-btn.correct-answer { border-color: var(--color-success); background: var(--color-success-highlight); }
    .option-btn:disabled { cursor: default; }
    .option-letter {
      font-weight: 700;
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      min-width: 20px;
      flex-shrink: 0;
    }
    .option-btn.selected .option-letter,
    .option-btn.correct .option-letter { color: inherit; }

    .explanation-box {
      margin-top: var(--space-5);
      padding: var(--space-5);
      border-radius: var(--radius-lg);
      background: var(--color-surface-offset);
      border-left: 4px solid var(--color-primary);
      display: none;
    }
    .explanation-box.show { display: block; }
    .explanation-title {
      font-size: var(--text-sm);
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: var(--space-2);
    }
    .explanation-text {
      font-size: var(--text-sm);
      color: var(--color-text);
      line-height: 1.65;
    }
    .trick-alert {
      margin-top: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      background: var(--color-gold-highlight);
      border: 1px solid var(--color-gold);
      font-size: var(--text-sm);
      color: var(--color-gold);
      font-weight: 600;
      display: flex;
      align-items: flex-start;
      gap: var(--space-2);
    }

    .quiz-next-btn {
      width: 100%;
      padding: var(--space-3);
      font-size: var(--text-sm);
      font-weight: 700;
      border-radius: var(--radius-lg);
      background: var(--color-primary);
      color: var(--color-primary-text);
      border: none;
      display: none;
    }
    .quiz-next-btn.show { display: block; }
    .quiz-next-btn:hover { background: var(--color-primary-hover); }

    /* QUIZ RESULTS */
    .quiz-results {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-8);
      text-align: center;
    }
    .results-score-ring {
      width: 120px;
      height: 120px;
      margin: 0 auto var(--space-5);
      position: relative;
    }
    .results-score-ring svg { transform: rotate(-90deg); }
    .results-score-text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .results-score-num {
      font-size: var(--text-lg);
      font-weight: 800;
      color: var(--color-text);
      line-height: 1;
    }
    .results-score-denom {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }
    .results-verdict {
      font-size: var(--text-lg);
      font-weight: 700;
      margin-bottom: var(--space-2);
    }
    .results-verdict.pass { color: var(--color-success); }
    .results-verdict.fail { color: var(--color-error); }
    .results-detail {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      margin-bottom: var(--space-6);
    }
    .results-breakdown {
      background: var(--color-surface-2);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      margin-bottom: var(--space-6);
      text-align: left;
    }
    .results-breakdown-title {
      font-size: var(--text-sm);
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: var(--space-4);
    }
    .results-topic-row {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-2) 0;
      border-bottom: 1px solid var(--color-border);
    }
    .results-topic-row:last-child { border-bottom: none; }
    .results-topic-name { flex: 1; font-size: var(--text-xs); color: var(--color-text); }
    .results-topic-stat { font-size: var(--text-xs); font-weight: 600; color: var(--color-text-muted); }
    .results-actions { display: flex; gap: var(--space-3); justify-content: center; }
    .results-retry-btn {
      padding: var(--space-3) var(--space-6);
      border-radius: var(--radius-full);
      background: var(--color-primary);
      color: var(--color-primary-text);
      font-weight: 700;
      font-size: var(--text-sm);
    }
    .results-retry-btn:hover { background: var(--color-primary-hover); }
    .results-review-btn {
      padding: var(--space-3) var(--space-6);
      border-radius: var(--radius-full);
      background: var(--color-surface-2);
      color: var(--color-text);
      font-weight: 600;
      font-size: var(--text-sm);
      border: 1px solid var(--color-border);
    }
    .results-review-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }

    /* ===== KEY NUMBERS ===== */
    .key-numbers-container { max-width: 900px; }
    .kn-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--space-4);
    }
    .kn-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      border-left: 4px solid var(--color-primary);
      transition: border-color var(--transition-interactive), transform var(--transition-interactive);
    }
    .kn-card:hover { border-left-color: var(--color-gold); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .kn-card.gold { border-left-color: var(--color-gold); }
    .kn-card.error { border-left-color: var(--color-error); }
    .kn-number {
      font-size: var(--text-lg);
      font-weight: 800;
      color: var(--color-primary);
      font-variant-numeric: tabular-nums;
      margin-bottom: var(--space-1);
      line-height: 1.2;
    }
    .kn-card.gold .kn-number { color: var(--color-gold); }
    .kn-card.error .kn-number { color: var(--color-error); }
    .kn-label {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: var(--space-1);
    }
    .kn-desc {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      line-height: 1.5;
    }
    .kn-section-title {
      font-size: var(--text-base);
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: var(--space-4);
      margin-top: var(--space-6);
      padding-bottom: var(--space-2);
      border-bottom: 1px solid var(--color-border);
    }
    .kn-section-title:first-child { margin-top: 0; }

    /* ===== TRICK PATTERNS ===== */
    .tricks-container { max-width: 800px; }
    .trick-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-6);
      margin-bottom: var(--space-4);
    }
    .trick-card-header {
      display: flex;
      align-items: flex-start;
      gap: var(--space-4);
      margin-bottom: var(--space-4);
      cursor: pointer;
    }
    .trick-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-md);
      background: var(--color-gold-highlight);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .trick-heading {
      flex: 1;
    }
    .trick-title {
      font-size: var(--text-base);
      font-weight: 700;
      color: var(--color-gold);
      margin-bottom: var(--space-1);
    }
    .trick-subtitle {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
    }
    .trick-body {
      padding-left: calc(40px + var(--space-4));
    }
    .trick-example {
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      margin-bottom: var(--space-3);
    }
    .trick-example-label {
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-muted);
      margin-bottom: var(--space-2);
    }
    .trick-example-text {
      font-size: var(--text-sm);
      color: var(--color-text);
      line-height: 1.6;
    }
    .trick-example-text mark {
      background: var(--color-gold-highlight);
      color: var(--color-gold);
      padding: 0 3px;
      border-radius: 2px;
    }
    .trick-tip {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      line-height: 1.6;
    }
    .trick-tip strong { color: var(--color-primary); }

    /* ===== OVERVIEW / HOME ===== */
    .overview-container { max-width: 900px; }
    .overview-hero {
      background: linear-gradient(135deg, var(--color-surface) 0%, var(--color-surface-2) 100%);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-8);
      margin-bottom: var(--space-6);
      position: relative;
      overflow: hidden;
    }
    .overview-hero::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, color-mix(in srgb, var(--color-primary) 15%, transparent), transparent 70%);
      pointer-events: none;
    }
    .overview-eyebrow {
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-primary);
      margin-bottom: var(--space-2);
    }
    .overview-h1 {
      font-size: var(--text-xl);
      font-weight: 800;
      color: var(--color-text);
      margin-bottom: var(--space-3);
      line-height: 1.2;
    }
    .overview-desc {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      max-width: 60ch;
      margin-bottom: var(--space-5);
    }
    .overview-stats {
      display: flex;
      gap: var(--space-6);
      flex-wrap: wrap;
    }
    .ov-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .ov-stat-num {
      font-size: var(--text-lg);
      font-weight: 800;
      color: var(--color-primary);
    }
    .ov-stat-label {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    .overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }
    .ov-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-5);
      cursor: pointer;
      transition: all var(--transition-interactive);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }
    .ov-card:hover {
      border-color: var(--color-primary);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    .ov-card-icon {
      width: 44px; height: 44px;
      border-radius: var(--radius-lg);
      background: var(--color-primary-highlight);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .ov-card.gold .ov-card-icon { background: var(--color-gold-highlight); }
    .ov-card.success .ov-card-icon { background: var(--color-success-highlight); }
    .ov-card.error .ov-card-icon { background: var(--color-error-highlight); }
    .ov-card-title {
      font-size: var(--text-base);
      font-weight: 700;
      color: var(--color-text);
    }
    .ov-card-desc {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      line-height: 1.5;
    }
    .ov-card-action {
      font-size: var(--text-xs);
      font-weight: 700;
      color: var(--color-primary);
      margin-top: auto;
    }
    .ov-card.gold .ov-card-action { color: var(--color-gold); }

    /* ===== MOBILE ===== */
    .mobile-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 90;
    }
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        transform: translateX(-100%);
        width: 280px !important;
        min-width: 280px !important;
        transition: transform 300ms ease;
        z-index: 100;
      }
      .sidebar.mobile-open {
        transform: translateX(0);
      }
      .mobile-overlay.show { display: block; }
      .view-area { padding: var(--space-4); }
      .topbar { padding: var(--space-3) var(--space-4); }
    }

    /* ===== REFERENCE TABLES ===== */
    .ref-tables-container {
      max-width: var(--content-wide);
      margin: 0 auto;
    }
    .ref-tab-bar {
      display: flex;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
      flex-wrap: wrap;
    }
    .ref-tab-btn {
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-full);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text-muted);
      font-family: var(--font-body);
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-interactive);
    }
    .ref-tab-btn:hover {
      border-color: var(--color-primary);
      color: var(--color-text);
    }
    .ref-tab-btn.active {
      background: var(--color-primary);
      color: var(--color-primary-text);
      border-color: var(--color-primary);
      font-weight: 600;
    }
    .ref-tab-panel {
      display: none;
    }
    .ref-tab-panel.active {
      display: block;
    }
    .ref-table-wrap {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .ref-table-scroll {
      overflow-x: auto;
      overflow-y: auto;
    }
    .ref-table-scroll.scrollable {
      max-height: 520px;
    }
    .ref-table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--text-sm);
      font-family: var(--font-body);
    }
    .ref-table thead {
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .ref-table thead th {
      background: var(--color-surface-2);
      color: var(--color-text);
      font-weight: 600;
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: var(--space-3) var(--space-4);
      text-align: left;
      white-space: nowrap;
      border-bottom: 2px solid var(--color-border);
    }
    .ref-table tbody tr {
      transition: background var(--transition-interactive);
    }
    .ref-table tbody tr:nth-child(odd) {
      background: var(--color-surface);
    }
    .ref-table tbody tr:nth-child(even) {
      background: var(--color-surface-2);
    }
    .ref-table tbody tr:hover {
      background: var(--color-surface-dynamic);
    }
    .ref-table tbody tr.hidden-row {
      display: none;
    }
    .ref-table td {
      padding: var(--space-3) var(--space-4);
      color: var(--color-text);
      border-bottom: 1px solid var(--color-divider);
      vertical-align: top;
      line-height: 1.5;
    }
    .ref-table td:first-child {
      max-width: 340px;
    }
    .ref-risk-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 600;
      white-space: nowrap;
    }
    .ref-risk-tag.lowest { background: #0d2b18; color: #22c55e; }
    .ref-risk-tag.low { background: #0d2b18; color: #4ade80; }
    .ref-risk-tag.medium { background: #2d1e06; color: #f59e0b; }
    .ref-risk-tag.high { background: #2d1206; color: #fb923c; }
    .ref-risk-tag.higher { background: #2d0a15; color: #f43f5e; }
    .ref-risk-tag.highest { background: #2d0a15; color: #ef4444; }
    .ref-topic-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 500;
      background: var(--color-primary-highlight);
      color: var(--color-primary);
      white-space: nowrap;
    }
    .ref-notes-box {
      margin-top: var(--space-4);
      padding: var(--space-4);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
    }
    .ref-notes-box h4 {
      font-size: var(--text-sm);
      font-weight: 700;
      color: var(--color-gold);
      margin-bottom: var(--space-3);
    }
    .ref-notes-box ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }
    .ref-notes-box li {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      padding-left: var(--space-4);
      position: relative;
      line-height: 1.6;
    }
    .ref-notes-box li::before {
      content: '▸';
      position: absolute;
      left: 0;
      color: var(--color-gold);
    }
    .ref-filter-bar {
      display: flex;
      gap: var(--space-2);

      tip: "<strong>LC (Licensed Corporation)</strong> → <strong>RO (Responsible Officer)</strong> → subject to Client Money Rules.\n\n<strong>RI (Registered Institution)</strong> → <strong>EO (Executive Officer)</strong> → regulated by HKMA; Client Money Rules do NOT apply for Type 1 activity.\n\nAlways check if the question says 'licensed corporation' or 'registered institution'."
    }
  },
  {
    icon: "🔢",
    title: "Roman numeral \"I, II, III\" combinations",
    subtitle: "Evaluate each statement independently first",
    example: {
      q: "Which circumstances constitute market misconduct?\nI. Act in HK, HK securities\nII. Act in HK, overseas securities\nIII. Act overseas, HK securities",
      highlight: "I, II and III",
      tip: "Evaluate each Roman numeral statement as TRUE or FALSE independently, then find the answer that matches your assessment. Do NOT look at the answer choices first — they can bias your evaluation. Write T/F next to each, then find the matching option."
    }
  },
  {
    icon: "📏",
    title: "\"may\" vs \"must\" vs \"shall\"",
    subtitle: "Mandatory vs discretionary distinctions",

      highlight: "may",
      tip: "<strong>SHALL / MUST</strong> = mandatory, no discretion.\n\n<strong>MAY</strong> = discretionary, regulator has a choice.\n\nExam questions often swap 'may' with 'must' or vice versa to create incorrect statements. Pay close attention to modal verbs."

  {

      tip: "<strong>Standing authority max: 12 months</strong>\n<strong>Deemed renewal notice: 14 days</strong>\n<strong>Renewal confirmation: 1 week</strong>\n<strong>Unsolicited call rescission: 28 days (or 7 days)</strong>\n<strong>ICF max securities: HK$500k; combined: HK$1m</strong>\n<strong>Phone recordings: 6 months</strong>\n\nMemorize these as a group — they are frequently tested together."
    }
  },
  {
    icon: "🎯",
    title: "License type confusion",

<script>
// ===== APP STATE =====
let state = {
  mode: 'overview',
  currentTopic: 1,
  quiz: {
    active: false,
    questions: [],
    currentIndex: 0,
    answered: false,
    selectedOption: null,
    score: 0,
    topicScores: {},
    timer: null,
    timeLeft: 0,
    useTimer: false,
    numQuestions: 10,
    filterTopic: 0,
    finished: false,
    results: []
  },
  flashcards: {
    currentIndex: 0,
    isFlipped: false,
    currentFilter: 'all',
    status: {} // cardId -> 'known' | 'review'
  },
  progress: {}
};

// State is in-memory only
function loadState() {}
function saveState() {}

// ===== INIT =====
function init() {
  loadState();
  renderSidebar();
  updateProgressSummary();
  switchMode('overview');
  initThemeToggle();
  initSidebarToggle();
}

let _theme = 'dark';
function initThemeToggle() {
  const btn = document.getElementById('themeToggle');
  const html = document.documentElement;
  html.setAttribute('data-theme', _theme);
  updateThemeIcon(btn, _theme);
  btn.addEventListener('click', () => {
    _theme = _theme === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', _theme);
    updateThemeIcon(btn, _theme);
  });
}

function updateThemeIcon(btn, theme) {
  if (theme === 'dark') {
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
  } else {
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
  }
}

function initSidebarToggle() {
  const toggle = document.getElementById('sidebarToggle');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('mobileOverlay');
  const isMobile = () => window.innerWidth <= 768;

  toggle.addEventListener('click', () => {
    if (isMobile()) {
      sidebar.classList.toggle('mobile-open');
      overlay.classList.toggle('show');
    } else {
      sidebar.classList.toggle('collapsed');
    }
  });
  overlay.addEventListener('click', () => {
    sidebar.classList.remove('mobile-open');
    overlay.classList.remove('show');
  });
}

function closeMobileSidebar() {
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('mobile-open');
    document.getElementById('mobileOverlay').classList.remove('show');
  }
}

// ===== SIDEBAR =====
function renderSidebar() {
  const nav = document.getElementById('sidebarTopics');
  const maxWeight = Math.max(...TOPICS.map(t => t.weight));
  nav.innerHTML = TOPICS.map(t => `
    <div class="topic-nav-item${state.currentTopic === t.id && (state.mode === 'mindmap' || state.mode === 'flashcard') ? ' active' : ''}"
         onclick="selectTopic(${t.id})"
         data-topic="${t.id}">
      <span class="topic-num">T${t.id}</span>
      <div class="topic-info">
        <div class="topic-name">${t.title}</div>
        <div class="topic-weight">${t.weight}% of exam</div>
        <div class="weight-bar"><div class="weight-fill" style="width:${(t.weight/maxWeight)*100}%"></div></div>
      </div>
    </div>
  `).join('');
}

function updateProgressSummary() {
  const total = FLASHCARDS.length;
  const known = Object.values(state.flashcards.status).filter(s => s === 'known').length;
  document.getElementById('progressSummary').textContent = `${known}/${total} cards mastered`;
}

function selectTopic(topicId) {
  state.currentTopic = topicId;
  if (state.mode !== 'mindmap' && state.mode !== 'flashcard') {
    switchMode('mindmap');
  } else {
    renderContent();
  }
  renderSidebar();
  closeMobileSidebar();
}

// ===== MODE SWITCH =====
function switchMode(mode) {
  state.mode = mode;
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });
  // Hide topic nav when on non-topic modes
  const topicsNav = document.getElementById('sidebarTopics');
  if (topicsNav) {
    topicsNav.style.display = (mode === 'mindmap' || mode === 'flashcard') ? 'block' : 'block';
  }
  // Stop quiz timer if switching away
  if (mode !== 'quiz' && state.quiz.timer) {
    clearInterval(state.quiz.timer);
  }
  renderSidebar();
  renderContent();
}

function renderContent() {
  const area = document.getElementById('viewArea');
  const titleEl = document.getElementById('topbarTitle');
  const badgeEl = document.getElementById('topbarBadge');

  switch(state.mode) {
    case 'overview':
      titleEl.textContent = 'HKSI Paper 2 — Study Tool';
      badgeEl.textContent = '40 MCQ · 60 min · 70% pass';
      area.innerHTML = renderOverview();
      break;
    case 'mindmap':
      const t = TOPICS.find(x => x.id === state.currentTopic) || TOPICS[0];
      titleEl.textContent = `T${t.id}: ${t.title}`;
      badgeEl.textContent = `${t.weight}% of exam`;
      area.innerHTML = renderMindMap(t);
      break;
    case 'flashcard':
      titleEl.textContent = 'Flashcards';
      badgeEl.textContent = `${FLASHCARDS.length} cards`;
      area.innerHTML = renderFlashcardUI();
      initFlashcard();
      break;
    case 'quiz':
      titleEl.textContent = 'Quiz Mode';
      badgeEl.textContent = '40 questions available';
      area.innerHTML = renderQuizUI();
      initQuizUI();
      break;
    case 'numbers':
      titleEl.textContent = 'Key Numbers Reference';
      badgeEl.textContent = 'Quick Reference';
      area.innerHTML = renderKeyNumbers();
      break;
    case 'tricks':
      titleEl.textContent = 'Trick Question Patterns';
      badgeEl.textContent = 'Exam Strategy';
      area.innerHTML = renderTrickPatterns();
      break;
    case 'tables':
      titleEl.textContent = 'Quick Reference Tables';
      badgeEl.textContent = 'Capital · Penalties · Timelines';
      area.innerHTML = renderRefTables();
      initTableTabs();
      break;
  }
}

// ===== MIND MAP =====
function renderMindMap(topic) {
  return `
  <div class="mindmap-container">
    <div class="mindmap-header">
      <div class="mindmap-title">T${topic.id}: ${topic.title}</div>
      <div class="mindmap-desc">${topic.desc}</div>
    </div>
    <div class="mindmap-controls">
      <button class="ctrl-btn" onclick="expandAll()">Expand All</button>
      <button class="ctrl-btn" onclick="collapseAll()">Collapse All</button>
    </div>
    <div class="tree-root" id="treeRoot">
      ${topic.nodes.map((node, i) => renderTreeNode(node, 0, `n${i}`)).join('')}
    </div>
  </div>`;
}

function renderTreeNode(node, level, key) {
  const hasChildren = node.children && node.children.length > 0;
  const tagHTML = node.tag ? `<span class="tree-tag${node.tag === 'important' || node.tag === 'EXAM' ? ' important' : ''}">${node.tag}</span>` : '';

  if (!hasChildren) {
    return `<div class="tree-node">
      <div class="tree-node-header level-${level}" style="${level > 0 ? '' : ''}">
        <span class="tree-spacer"></span>
        <span class="tree-label">${escapeHtml(node.label)}</span>
        ${tagHTML}
      </div>
    </div>`;
  }

  return `<div class="tree-node" id="${key}">
    <div class="tree-node-header level-${level} open" onclick="toggleNode('${key}')">
      <span class="tree-toggle">▶</span>
      <span class="tree-label">${escapeHtml(node.label)}</span>
      ${tagHTML}
    </div>
    <div class="tree-children" id="${key}_c">
      ${node.children.map((child, i) => renderTreeNode(child, level + 1, `${key}_${i}`)).join('')}
    </div>
  </div>`;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleNode(key) {
  const header = document.querySelector(`#${key} > .tree-node-header`);
  const children = document.getElementById(`${key}_c`);
  if (!header || !children) return;
  const isOpen = header.classList.contains('open');
  if (isOpen) {
    header.classList.remove('open');
    children.classList.add('hidden');
  } else {
    header.classList.add('open');
    children.classList.remove('hidden');
  }
}

function expandAll() {
  document.querySelectorAll('.tree-node-header').forEach(h => h.classList.add('open'));
  document.querySelectorAll('.tree-children').forEach(c => c.classList.remove('hidden'));
}

function collapseAll() {
  document.querySelectorAll('.tree-node-header').forEach(h => h.classList.remove('open'));
  document.querySelectorAll('.tree-children').forEach(c => c.classList.add('hidden'));
}

// ===== FLASHCARD =====
function renderFlashcardUI() {
  return `<div class="flashcard-container">
    <div class="fc-header">
      <div class="fc-filter">
        <button class="fc-filter-btn${state.flashcards.currentFilter === 'all' ? ' active' : ''}" onclick="setFCFilter('all')">All (${FLASHCARDS.length})</button>
        <button class="fc-filter-btn${state.flashcards.currentFilter === 'review' ? ' active' : ''}" onclick="setFCFilter('review')">Review Again</button>
        <button class="fc-filter-btn${state.flashcards.currentFilter === 'unknown' ? ' active' : ''}" onclick="setFCFilter('unknown')">Unstudied</button>
      </div>
    </div>

      <div class="fc-progress-bar">
        <div class="fc-progress-fill" id="fcProgressFill" style="width:0%"></div>
      </div>

        <span id="fcKnownCount">0 mastered</span>
      </div>

    <div class="fc-scene" onclick="flipCard()" id="fcScene" role="button" aria-label="Click to flip card">
      <div class="fc-card" id="fcInner">
        <div class="fc-face fc-front">
          <div class="fc-card-label">Question / Term</div>
          <div class="fc-term" id="fcTerm">Loading...</div>
          <div class="fc-topic-tag" id="fcTopicTag">T1</div>
          <div class="fc-hint">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm0 15v-4m0-4h.01"/></svg>
            Click to reveal answer
          </div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-card-label">Answer / Definition</div>
          <div class="fc-definition" id="fcDef">Loading...</div>
          <div class="fc-topic-tag" id="fcTopicTagBack">T1</div>
        </div>
      </div>
    </div>
    <div class="fc-actions" id="fcActions" style="display:none">
      <button class="fc-review" onclick="markCard('review')">Review Again</button>
      <button class="fc-got-it" onclick="markCard('known')">Got It ✓</button>
    </div>
    <div class="fc-nav">
      <button class="fc-nav-btn" onclick="navCard(-1)">← Prev</button>
      <span class="fc-counter" id="cardCounter">1 / ${FLASHCARDS.length}</span>
      <button class="fc-nav-btn" onclick="navCard(1)">Next →</button>
    </div>
  </div>`;
}

function getFilteredCards(filter) {
  switch(filter) {
    case 'review': return FLASHCARDS.filter(c => state.flashcards.status[c.id] === 'review');
    case 'unknown': return FLASHCARDS.filter(c => !state.flashcards.status[c.id]);
    default: return FLASHCARDS;
  }
}

function initFlashcard() {
  showCard(state.flashcards.currentIndex);
  updateFCProgress();
}

function showCard(index) {
  const cards = getFilteredCards(state.flashcards.currentFilter);
  if (cards.length === 0) {
    document.getElementById('fcScene').innerHTML = `<div style="text-align:center;padding:var(--space-8);color:var(--color-text-muted);">No cards in this filter. <button onclick="setFCFilter('all')" style="color:var(--color-primary);text-decoration:underline;background:none;border:none;cursor:pointer;">Show all cards</button></div>`;
    return;
  }
  state.flashcards.currentIndex = Math.max(0, Math.min(index, cards.length - 1));
  state.flashcards.isFlipped = false;

  const card = cards[state.flashcards.currentIndex];
  const topic = TOPICS[card.topic - 1];
  const inner = document.getElementById('fcInner');
  const term = document.getElementById('fcTerm');
  const def = document.getElementById('fcDef');
  const topicTag = document.getElementById('fcTopicTag');
  const topicTagBack = document.getElementById('fcTopicTagBack');
  const counter = document.getElementById('cardCounter');
  const actions = document.getElementById('fcActions');
  if (!inner) return;

  inner.classList.remove('flipped');
  if (term) term.textContent = card.front;
  if (def) def.innerHTML = card.back.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  const tagText = `T${card.topic}: ${topic ? topic.title.split(' – ')[0] || topic.title.split(' ')[0] : 'Topic'}`;
  if (topicTag) topicTag.textContent = tagText;
  if (topicTagBack) topicTagBack.textContent = tagText;
  if (counter) counter.textContent = `${state.flashcards.currentIndex + 1} / ${cards.length}`;
  if (actions) actions.style.display = 'none';
  updateFCProgress();
}

function flipCard() {
  const inner = document.getElementById('fcInner');
  const actions = document.getElementById('fcActions');
  if (!inner) return;
  state.flashcards.isFlipped = !state.flashcards.isFlipped;
  if (state.flashcards.isFlipped) {
    inner.classList.add('flipped');
    if (actions) actions.style.display = 'flex';
  } else {
    inner.classList.remove('flipped');
    if (actions) actions.style.display = 'none';
  }
}

function markCard(status) {
  const cards = getFilteredCards(state.flashcards.currentFilter);
  if (cards.length === 0) return;
  const card = cards[state.flashcards.currentIndex];
  state.flashcards.status[card.id] = status;
  saveState();
  updateProgressSummary();
  navCard(1);
}

function navCard(dir) {
  const cards = getFilteredCards(state.flashcards.currentFilter);
  if (cards.length === 0) return;
  let next = state.flashcards.currentIndex + dir;
  if (next >= cards.length) next = 0;
  if (next < 0) next = cards.length - 1;
  showCard(next);
}

function setFCFilter(filter) {
  state.flashcards.currentFilter = filter;
  state.flashcards.currentIndex = 0;
  document.querySelectorAll('.fc-filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase().startsWith(filter));
  });
  showCard(0);
}

function updateFCProgress() {
  const total = FLASHCARDS.length;
  const known = Object.values(state.flashcards.status).filter(s => s === 'known').length;
  const fill = document.getElementById('fcProgressFill');
  const meta = document.getElementById('fcProgressMeta');
  const knownEl = document.getElementById('fcKnownCount');
  const cards = getFilteredCards(state.flashcards.currentFilter);
  if (fill) fill.style.width = total > 0 ? `${(known / total) * 100}%` : '0%';
  if (meta) meta.textContent = `Card ${state.flashcards.currentIndex + 1} of ${cards.length}`;
  if (knownEl) knownEl.textContent = `${known} mastered`;
}

// ===== QUIZ =====

  return `<div class="quiz-setup" id="quizSetup">

    <div class="quiz-setup-sub">Test yourself with randomly selected practice questions.</div>
    <div class="quiz-options">
      <div class="quiz-option-group">
        <div class="quiz-option-label">Number of Questions</div>
        <div class="quiz-option-row">
          ${[5, 10, 20, 40].map(n => `<button class="qo-btn${state.quiz.numQuestions === n ? ' selected' : ''}" onclick="setQuizOpt('numQuestions', ${n})">${n}</button>`).join('')}
        </div>
      </div>
      <div class="quiz-option-group">
        <div class="quiz-option-label">Topic Filter</div>
        <div class="quiz-option-row">
          <button class="qo-btn${state.quiz.filterTopic === 0 ? ' selected' : ''}" onclick="setQuizOpt('filterTopic', 0)">All Topics</button>
          ${TOPICS.map(t => `<button class="qo-btn${state.quiz.filterTopic === t.id ? ' selected' : ''}" onclick="setQuizOpt('filterTopic', ${t.id})">T${t.id}</button>`).join('')}
        </div>
      </div>
      <div class="quiz-option-group">
        <div class="quiz-option-label">Timer</div>
        <div class="quiz-option-row">
          <button class="qo-btn${!state.quiz.useTimer ? ' selected' : ''}" onclick="setQuizOpt('useTimer', false)">No Timer</button>
          <button class="qo-btn${state.quiz.useTimer ? ' selected' : ''}" onclick="setQuizOpt('useTimer', true)">60 min Timer</button>
        </div>
      </div>
    </div>
    <button class="start-quiz-btn" onclick="startQuiz()">Start Quiz</button>
  </div>`;
}

function initQuizUI() {
  // Nothing special needed on init
}

function setQuizOpt(key, val) {
  state.quiz[key] = val;
  document.getElementById('quizContainer').innerHTML = renderQuizSetup();
}

function startQuiz() {
  let pool = state.quiz.filterTopic === 0 ? QUESTIONS : QUESTIONS.filter(q => q.topic === state.quiz.filterTopic);
  // Shuffle
  pool = [...pool].sort(() => Math.random() - 0.5);
  state.quiz.questions = pool.slice(0, Math.min(state.quiz.numQuestions, pool.length));
  state.quiz.currentIndex = 0;
  state.quiz.answered = false;
  state.quiz.selectedOption = null;
  state.quiz.score = 0;
  state.quiz.topicScores = {};
  state.quiz.finished = false;
  state.quiz.results = [];
  state.quiz.active = true;

  if (state.quiz.useTimer) {
    state.quiz.timeLeft = 3600; // 60 min
    startQuizTimer();
  }

  renderQuizQuestion();
}

function startQuizTimer() {
  if (state.quiz.timer) clearInterval(state.quiz.timer);
  state.quiz.timer = setInterval(() => {
    state.quiz.timeLeft--;
    updateTimerDisplay();
    if (state.quiz.timeLeft <= 0) {
      clearInterval(state.quiz.timer);
      finishQuiz();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const el = document.getElementById('quizTimer');
  if (!el) return;
  const m = Math.floor(state.quiz.timeLeft / 60).toString().padStart(2, '0');
  const s = (state.quiz.timeLeft % 60).toString().padStart(2, '0');
  el.textContent = `${m}:${s}`;
  el.className = 'quiz-timer';
  if (state.quiz.timeLeft < 300) el.className = 'quiz-timer danger';
  else if (state.quiz.timeLeft < 600) el.className = 'quiz-timer warning';
}

function renderQuizQuestion() {
  const q = state.quiz.questions[state.quiz.currentIndex];
  const total = state.quiz.questions.length;
  const prog = ((state.quiz.currentIndex) / total) * 100;
  const m = Math.floor(state.quiz.timeLeft / 60).toString().padStart(2, '0');
  const s = (state.quiz.timeLeft % 60).toString().padStart(2, '0');
  const timerHTML = state.quiz.useTimer ? `<span class="quiz-timer" id="quizTimer">${m}:${s}</span>` : '';
  const hasTrick = q.trick !== null;

  const html = `
  <div class="quiz-active" id="quizActive">
    <div class="quiz-topbar">
      <span class="quiz-progress-text">Question ${state.quiz.currentIndex + 1} of ${total}</span>
      <span class="quiz-score">Score: ${state.quiz.score}/${state.quiz.currentIndex}</span>
      ${timerHTML}
    </div>
    <div class="quiz-q-bar"><div class="quiz-q-fill" style="width:${prog}%"></div></div>
    <div class="question-card" id="questionCard">
      <div class="question-meta">
        <span class="q-topic-tag">T${q.topic}: ${q.topicName}</span>
        ${hasTrick ? `<span class="q-trick-tag">⚡ Watch for "${q.trick}"</span>` : ''}
        <span class="question-num">Q${q.id}</span>
      </div>
      <div class="question-text">${q.text.replace(/\n/g, '<br>')}</div>
      <div class="options-list" id="optionsList">
        ${q.options.map((opt, i) => `
          <button class="option-btn" data-index="${i}" onclick="selectAnswer(${i})" id="opt_${i}">
            <span class="option-letter">${String.fromCharCode(65+i)})</span>
            <span>${opt.substring(3)}</span>
          </button>
        `).join('')}
      </div>
      <div class="explanation-box" id="explanationBox">
        <div class="explanation-title">Explanation</div>
        <div class="explanation-text">${q.explanation}</div>
        ${hasTrick ? `<div class="trick-alert">⚠️ TRICK ALERT: This question uses "${q.trick}" wording. Always look for the ${q.trick === 'INCORRECT' || q.trick === 'NOT' ? 'false/excluded' : 'exception'} statement.</div>` : ''}
      </div>
    </div>
    <button class="quiz-next-btn" id="quizNextBtn" onclick="nextQuestion()">
      ${state.quiz.currentIndex + 1 < total ? 'Next Question →' : 'See Results'}
    </button>
  </div>`;

  document.getElementById('quizContainer').innerHTML = html;
}

function selectAnswer(optionIndex) {
  if (state.quiz.answered) return;
  state.quiz.answered = true;
  state.quiz.selectedOption = optionIndex;
  const q = state.quiz.questions[state.quiz.currentIndex];
  const correct = optionIndex === q.answer;

  if (correct) state.quiz.score++;

  // Track by topic
  if (!state.quiz.topicScores[q.topic]) state.quiz.topicScores[q.topic] = { correct: 0, total: 0 };
  state.quiz.topicScores[q.topic].total++;
  if (correct) state.quiz.topicScores[q.topic].correct++;

  state.quiz.results.push({ qId: q.id, correct, topicId: q.topic });

  // Style buttons
  for (let i = 0; i < q.options.length; i++) {
    const btn = document.getElementById(`opt_${i}`);
    btn.disabled = true;
    if (i === q.answer) btn.classList.add('correct-answer');
    if (i === optionIndex && !correct) btn.classList.add('incorrect');
    if (i === optionIndex && correct) btn.classList.add('correct');
  }

  // Show explanation
  document.getElementById('explanationBox').classList.add('show');
  document.getElementById('quizNextBtn').classList.add('show');

  // Update score display
  const scoreEl = document.querySelector('.quiz-score');
  if (scoreEl) scoreEl.textContent = `Score: ${state.quiz.score}/${state.quiz.currentIndex + 1}`;
}

function nextQuestion() {
  state.quiz.currentIndex++;
  state.quiz.answered = false;
  state.quiz.selectedOption = null;
  if (state.quiz.currentIndex >= state.quiz.questions.length) {
    finishQuiz();
  } else {
    renderQuizQuestion();
  }
}

function finishQuiz() {
  if (state.quiz.timer) clearInterval(state.quiz.timer);
  state.quiz.finished = true;
  const total = state.quiz.questions.length;
  const score = state.quiz.score;
  const pct = total > 0 ? Math.round((score / total) * 100) : 0;
  const pass = pct >= 70;
  const circumference = 2 * Math.PI * 45;
  const offset = circumference - (pct / 100) * circumference;

  const breakdown = Object.entries(state.quiz.topicScores).map(([topicId, ts]) => {
    const topic = TOPICS.find(t => t.id === parseInt(topicId));
    return `<div class="results-topic-row">
      <div class="results-topic-name">${topic ? `T${topicId}: ${topic.title}` : `Topic ${topicId}`}</div>
      <div class="results-topic-stat">${ts.correct}/${ts.total} (${Math.round((ts.correct/ts.total)*100)}%)</div>
    </div>`;
  }).join('');

  document.getElementById('quizContainer').innerHTML = `
  <div class="quiz-results">
    <div class="results-score-ring">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="45" stroke="var(--color-border)" stroke-width="10" fill="none"/>
        <circle cx="60" cy="60" r="45" stroke="${pass ? 'var(--color-success)' : 'var(--color-error)'}"
                stroke-width="10" fill="none" stroke-dasharray="${circumference}"
                stroke-dashoffset="${offset}" stroke-linecap="round"/>
      </svg>
      <div class="results-score-text">
        <span class="results-score-num">${pct}%</span>
        <span class="results-score-denom">${score}/${total}</span>
      </div>
    </div>
    <div class="results-verdict ${pass ? 'pass' : 'fail'}">${pass ? '✓ PASS' : '✗ FAIL'}</div>
    <div class="results-detail">${pass ? 'Well done! You exceeded the 70% pass mark.' : 'Keep studying. You need 70% to pass the exam.'}</div>
    ${breakdown ? `<div class="results-breakdown"><div class="results-breakdown-title">Performance by Topic</div>${breakdown}</div>` : ''}
    <div class="results-actions">
      <button class="results-retry-btn" onclick="startQuiz()">Retry Quiz</button>
      <button class="results-review-btn" onclick="resetQuizSetup()">Change Settings</button>
    </div>
  </div>`;
}

function resetQuizSetup() {
  state.quiz.active = false;
  document.getElementById('quizContainer').innerHTML = renderQuizSetup();
}

let _currentTimelineCat = 'All';

function switchRefTab(tab) {
  document.querySelectorAll('.ref-tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('refTabCapital').classList.toggle('active', tab === 'capital');
  document.getElementById('refTabPenalties').classList.toggle('active', tab === 'penalties');
  document.getElementById('refTabTimelines').classList.toggle('active', tab === 'timelines');
}

function filterTimelineCat(btn, cat) {
  _currentTimelineCat = cat;
  document.querySelectorAll('#timelineCategoryBar .ref-filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  filterTimelines();
}

function filterTimelines() {
  const search = (document.getElementById('timelineSearch')?.value || '').toLowerCase();
  const cat = _currentTimelineCat;
  const rows = document.querySelectorAll('#timelineTable tbody tr');
  let visible = 0;
  rows.forEach(row => {
    const text = row.textContent.toLowerCase();
    const rowCat = row.dataset.cat;
    const matchCat = cat === 'All' || rowCat === cat;
    const matchSearch = !search || text.includes(search);
    const show = matchCat && matchSearch;
    row.classList.toggle('hidden-row', !show);
    if (show) visible++;
  });
  const countEl = document.getElementById('timelineCount');
  if (countEl) countEl.textContent = `${visible} of ${REF_TIMELINES_DATA.length} entries`;
}

function initTableTabs() {
  // Tables are already rendered, just reset state
  _currentTimelineCat = 'All';
}

window.switchRefTab = switchRefTab;
window.filterTimelineCat = filterTimelineCat;
window.filterTimelines = filterTimelines;

document.addEventListener('DOMContentLoaded', init);
